<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Mini</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1>Snake Mini</h1>
        <div class="stats" aria-live="polite">
          <span>Score: <strong id="score">0</strong></span>
          <span>Best: <strong id="best">0</strong></span>
        </div>
      </header>

      <section class="game-wrap" aria-label="Snake game area">
        <canvas id="game" width="420" height="420" role="img" aria-label="Snake game board"></canvas>
        <div id="overlay" class="overlay">
          <h2 id="overlay-title">Snake Mini</h2>
          <p id="overlay-text">Use arrow keys or WASD to move.</p>
          <button id="start-btn" type="button">Start Game</button>
        </div>
      </section>

      <p class="hint">Tip: You can’t move directly backward into yourself.</p>
    </main>

    <script src="game.js"></script>
  </body>
</html>
